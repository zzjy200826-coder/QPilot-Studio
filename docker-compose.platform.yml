services:
  postgres:
    image: postgres:16-alpine
    container_name: qpilot-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qpilot
      POSTGRES_PASSWORD: qpilot
      POSTGRES_DB: qpilot_platform
    ports:
      - "5432:5432"
    volumes:
      - qpilot-platform-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: qpilot-platform-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - qpilot-platform-redis:/data

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: qpilot-platform-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - qpilot-platform-prometheus:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qpilot-platform-postgres:
  qpilot-platform-redis:
  qpilot-platform-prometheus:
